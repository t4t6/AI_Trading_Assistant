<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trading Assistant</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="AI Trading">
<link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
<div class="container">

<header>
  <div class="logo">📈 AI Trading Assistant</div>
  <div class="install-area">
    <button id="installButton" hidden>Install App</button>
  </div>
</header>

<div class="market-selector">
  <select id="modeSelector">
    <option value="signal">Buy/Sell Signal</option>
    <option value="binary">Binary (Next Candle)</option>
  </select>
  <select id="marketType">
    <option value="forex">Forex</option>
    <option value="crypto">Crypto</option>
    <option value="commodities">Commodities</option>
    <option value="favorites">Favorites</option>
  </select>
  <select id="symbolSelector"></select>
  <select id="timeframeSelector"></select>
  <button id="analyzeButton">Analyze</button>
</div>

<section class="signal-card">
  <div id="signal">WAIT</div>
  <div id="confidence">0%</div>
  <div id="nextCandle">-</div>
</section>

<section class="trade-card" id="tradeCard">
  <div class="row"><span>Entry</span><span id="entry">-</span></div>
  <div class="row"><span>Stop Loss</span><span id="sl">-</span></div>
  <div class="row"><span>Take Profit 1</span><span id="tp1">-</span></div>
  <div class="row"><span>Take Profit 2</span><span id="tp2">-</span></div>
  <div class="row"><span>Take Profit 3</span><span id="tp3">-</span></div>
</section>

<section class="status-card" id="statusCard">
  <div class="row"><span>Trend</span><span id="trend">-</span></div>
  <div class="row"><span>Trade Quality</span><span id="quality">-</span></div>
  <div class="row"><span>Volatility</span><span id="volatility">-</span></div>
  <div class="row"><span>Volume</span><span id="volume">-</span></div>
  <div class="row"><span>Timeframe Alignment</span><span id="alignment">-</span></div>
</section>

<section class="reason-card">
  <h3>AI Reasons</h3>
  <ul id="reasonList"></ul>
</section>

<section class="binary-card" id="binaryCard" hidden>
  <h2>Binary Prediction</h2>
  <div id="binarySignal">-</div>
</section>

<nav class="bottom-nav">
  <a href="index.html" class="active">Dashboard</a>
  <a href="watchlist.html">Watchlist</a>
  <a href="settings.html">Settings</a>
</nav>

</div>
<script src="js/common.js"></script>
<script src="js/app.js"></script>
</body>
</html>
